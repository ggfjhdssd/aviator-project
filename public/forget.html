<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Aviator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <h1>✈️ Aviator</h1>
            <h2>Reset Password</h2>
            
            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div id="message" class="success-message" style="display: none;"></div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn-primary">Send Reset Link</button>
            </form>
            
            <div class="auth-links">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            const errorDiv = document.getElementById('errorMessage');
            
            messageDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.style.display = 'block';
                    messageDiv.textContent = 'Password reset link sent to your email!';
                    document.getElementById('email').value = '';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.error || 'Request failed';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Connection error. Please try again.';
            }
        });
    </script>
</body>
</html>
